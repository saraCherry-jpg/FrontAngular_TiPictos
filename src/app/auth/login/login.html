<!--<h1 style="color:red">TEST CSS</h1> para pruebas -->

<div class="login-container">
  <!-- ANIMACIÓN -->
  <div class="login-animated-background"></div> <!-- a ver-->

  <div class="login-card" [class.zoom]="isLoading">

    <!-- BOTON MODO OSCURO -->
    <div class="login-theme-toggle">
      <i class="bi"
         [ngClass]="isDarkMode ? 'bi-sun-fill' : 'bi-moon-fill'"
         (click)="toggleTheme()">
      </i>
    </div>

    <!-- LOGO ANIMADO -->
    <div class="login-logo-frame">
      <img src="assets/imagenes/TiPictosLogo.png"
           class="login-logo-frame1"
           alt="TiPictos Logo">

      <img src="assets/imagenes/logoAni1.png"
           class="login-logo-frame2"
           alt="Logo Animado">
    </div>

    <!-- TITULO -->
    <!-- <h1 class="login-title">TiPictos</h1> -->
    <h2 class="login-subtitle">Iniciar Sesión</h2>


    <!-- FORMULARIO -->
    <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">

      <div class="login-input-group">
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="Correo electrónico">
      </div>

      <!-- PASSWORD CON ICONO DE OJO -->
      <div class="login-input-group login-password-group">

        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="Contraseña">

        <i class="bi"
           [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
           (click)="togglePassword()">
        </i>

      </div>

      <!-- BOTON PRINCIPAL -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="loginForm.invalid || isLoading">

        {{ isLoading ? 'Cargando...' : 'Iniciar' }}

      </button>
    </form>


    <!-- BOTONES SECUNDARIOS -->
    <div class="login-actions">

      <button
        type="button"
        class="login-btn-secondary"
        (click)="goToRegister()">
        Registrar
      </button>

      <button
        type="button"
        class="login-btn-danger"
        (click)="exit()">
        Salir
      </button>

    </div>
  </div>
</div>
