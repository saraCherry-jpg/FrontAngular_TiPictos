<div class="register-container">

  <!-- FONDO ANIMADO -->
  <div class="register-animated-background"></div>

  <div class="register-card" [class.zoom]="isLoading">

    <!-- BOTON CAMBIO DE TEMA -->
    <div class="register-theme-toggle-inside">
      <i class="bi"
         [ngClass]="isDarkMode ? 'bi-sun-fill' : 'bi-moon-fill'"
         (click)="toggleTheme()">
      </i>
    </div>

    <!-- LOGO ANIMADO -->
    <div class="register-logo-frame">

      <img src="assets/imagenes/TiPictosLogo.png"
           class="register-logo-frame1"
           alt="TiPictos Logo">

      <img src="assets/imagenes/logoAni1.png"
           class="register-logo-frame2"
           alt="Logo Animado">

    </div>


    <h2 class="register-h2">Crear Cuenta</h2>

    <!-- FORMULARIO -->
    <form (ngSubmit)="register()" #registerForm="ngForm">

      <!-- NOMBRE COMPLETO -->
      <div class="register-input-group">
        <input
          type="text"
          name="name"
          [(ngModel)]="name"
          required
          placeholder="Nombre completo">
      </div>

      <!-- USERNAME -->
      <div class="register-input-group">
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          placeholder="Nombre de Usuario">
      </div>

      <!-- EMAIL -->
      <div class="register-input-group">
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="Correo electrónico">
      </div>

      <!-- PASSWORD -->
      <div class="register-input-group register-password-group">

        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="Contraseña">

        <i class="bi"
           [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
           (click)="togglePassword()">
        </i>

      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="register-input-group register-password-group">

        <input
          [type]="showPassword ? 'text' : 'password'"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          placeholder="Confirmar contraseña">

        <i class="bi"
           [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
           (click)="togglePassword()">
        </i>

      </div>

      <!-- BOTON REGISTRAR -->
      <button
        type="submit"
        class="register-button"
        [disabled]="registerForm.invalid || isLoading">

        {{ isLoading ? 'Registrando...' : 'Registrar' }}

      </button>

    </form>

    <!-- =========================================
         BOTONES SECUNDARIOS
    ========================================= -->

    <div class="register-extra-actions">

      <button
        type="button"
        class="register-secondary-btn"
        (click)="goToLogin()">

        Tengo una cuenta

      </button>

    </div>
  </div>
</div>
