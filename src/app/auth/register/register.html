<div class="register-container">

  <!-- FONDO ANIMADO -->
  <div class="register-animated-background"></div>

  <div class="register-card" [class.zoom]="isLoading">

    <!-- BOTON CAMBIO DE TEMA -->
    <div class="register-theme-toggle-inside">
      <i class="bi"
         [ngClass]="isDarkMode ? 'bi-sun-fill' : 'bi-moon-fill'"
         (click)="toggleTheme()">
      </i>
    </div>

    <!-- LOGO ANIMADO -->
    <div class="register-logo-frame">

      <img src="assets/imagenes/TiPictosLogo.png"
           class="register-logo-frame1"
           alt="TiPictos Logo">

      <img src="assets/imagenes/logoAni1.png"
           class="register-logo-frame2"
           alt="Logo Animado">

    </div>


    <h2 class="register-h2">Crear Cuenta</h2>

    <!-- FORMULARIO -->
    <form (ngSubmit)="register()" #registerForm="ngForm">

      <!-- NOMBRE COMPLETO -->
      <div class="register-input-group">
        <input
          type="text"
          name="name"
          [(ngModel)]="name"
          required
          #nameInput="ngModel"
          [class.register-input-error]="nameInput.invalid && nameInput.touched"
          placeholder="Nombre completo">

          <div *ngIf="nameInput.invalid && nameInput.touched" class="register-error-text">
            El nombre es obligatorio
          </div>
      </div>

      <!-- USERNAME -->
      <div class="register-input-group">
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          #usernameInput="ngModel"
          [class.register-input-error]="usernameInput.invalid && usernameInput.touched"
          placeholder="Nombre de Usuario">

          <div *ngIf="usernameInput.invalid && usernameInput.touched" class="register-error-text">
            El username es obligatorio
          </div>
      </div>

      <!-- EMAIL -->
      <div class="register-input-group">
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          #emailInput="ngModel"
          [class.register-input-error]="emailInput.invalid && emailInput.touched"
          placeholder="Correo electrónico">

          <div *ngIf="emailInput.invalid && emailInput.touched" class="register-error-text">
            El correo es obligatorio
          </div>
      </div>

      <!-- PASSWORD -->
      <div class="register-input-group register-password-group">

        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="password"
          required
          #passwordInput="ngModel"
          [class.register-input-error]="passwordInput.invalid && passwordInput.touched"
          placeholder="Contraseña">

        <i class="bi"
           [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
           (click)="togglePassword()">
        </i>

        <div *ngIf="passwordInput.invalid && passwordInput.touched" class="register-error-text">
          La contraseña es obligatoria
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="register-input-group register-password-group">

        <input
          [type]="showPassword ? 'text' : 'password'"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          #confirmPasswordInput="ngModel"
          [class.register-input-error]="
          (confirmPasswordInput.invalid && confirmPasswordInput.touched) ||
          (confirmPassword !== password && confirmPasswordInput.touched)
          "

          placeholder="Confirmar contraseña">

        <i class="bi"
           [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
           (click)="togglePassword()">
        </i>

        <div *ngIf="confirmPasswordInput.invalid && confirmPasswordInput.touched" class="register-error-text">
          Debe confirmar la contraseña
        </div>

        <div *ngIf="confirmPassword !== password && confirmPasswordInput.touched" class="register-error-text">
          Las contraseñas no coinciden
        </div>

      </div>

      <!-- BOTON REGISTRAR -->
      <button
        type="submit"
        class="register-button"
        (click)="registerForm.form.markAllAsTouched()"
        [disabled]="registerForm.invalid || isLoading">

        {{ isLoading ? 'Registrando...' : 'Registrar' }}

      </button>

    </form>

    <!-- =========================================
         BOTONES SECUNDARIOS
    ========================================= -->

    <div class="register-extra-actions">

      <button
        type="button"
        class="register-secondary-btn"
        (click)="goToLogin()">

        Tengo una cuenta

      </button>

    </div>
  </div>
</div>
